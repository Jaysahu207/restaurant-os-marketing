  >
    QR
  </text>

  <!-- RASOI TEXT INSIDE ICON -->
  <text
    x="100"
    y="152"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    fill="#111827"
    text-anchor="middle"
    letter-spacing="5"
