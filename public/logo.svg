    rasoi
  </text>

  <!-- DECORATIVE DOTS -->
  <circle cx="82" cy="178" r="3" fill="#EA580C" opacity="0.6" />
  <circle cx="100" cy="183" r="3" fill="#EA580C" opacity="0.6" />
  <circle cx="118" cy="178" r="3" fill="#EA580C" opacity="0.6" />

  <!-- DIVIDER -->
  <line
    x1="210"
    y1="40"
    x2="210"
    y2="185"
    stroke="#EA580C"
    stroke-width="1.5"
    opacity="0.4"
  />

  <!-- BRAND NAME -->
  <text
    x="228"
    y="106"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="64"
    font-weight="700"
    fill="#111827"
